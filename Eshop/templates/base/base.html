<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="FIGHA — Premium men's fashion store. Shop the latest in shirts, denim, blazers, and more.">
    <title>
      FIGHA | {% block title %}{% endblock %}
    </title>
    <!-- favicon -->
    <link rel="shortcut icon" href="{% static 'images/icons/favicon.ico' %}"
      type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous">
    <!-- bootstrap icons -->
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- custom css -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  </head>
  <body>
    <!-- header -->
    {% include 'base/includes/header.html' %}

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <!-- Toast notification -->
    <div id="cart-toast" class="cart-toast">
      <i class="bi bi-check-circle-fill me-2"></i> Item added to cart!
    </div>

    <!-- footer -->
    {% include 'base/includes/footer.html' %}

    <!-- bootstrap javascript -->
    <script src="{% static 'js/scripts.js' %}"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>

  </body>
</html>
