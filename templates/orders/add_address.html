{% extends 'base/base.html' %}

{% block title %}
Add Address
{% endblock %}

{% block content %}
<div class="add_address">
    <h3 style="font-weight:700; color:#f0f0f0; margin-bottom:20px;">
        <i class="bi bi-plus-circle me-2" style="color:#c9a96a;"></i>Add New Address
    </h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success mt-3">
            <i class="bi bi-check-lg me-1"></i> Save Address
        </button>
    </form>
</div>
{% endblock %}
