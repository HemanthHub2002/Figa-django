{% extends 'base/base.html' %}

{% block title %}
Select Address
{% endblock %}

{% block content %}
<div class="select_address">
    <h3><i class="bi bi-geo-alt me-2" style="color:#c9a96a;"></i>Select an Address</h3>
    <form method="post">
        {% csrf_token %}
        <ul>
            {% for address in addresses %}
            <li>
                <label>
                    <input type="radio" name="address" value="{{ address.id }}">
                    <span>
                        <strong>{{ address.full_name }}</strong><br>
                        <small style="color:#a0a0a0;">
                            {{ address.address_line1 }}, {{ address.city }}, {{ address.state }} - {{ address.pincode }}
                        </small>
                    </span>
                </label>
            </li>
            {% empty %}
            <li style="text-align:center; padding:30px; color:#707070;">
                <i class="bi bi-geo" style="font-size:32px; display:block; margin-bottom:10px;"></i>
                No saved addresses found.
            </li>
            {% endfor %}
        </ul>
        {% if addresses %}
        <button type="submit" class="btn">
            <i class="bi bi-check-lg me-1"></i> Select Address
        </button>
        {% endif %}
    </form>
    <a href="{% url 'add_address' %}?next={{ request.path }}" class="btn" style="margin-top:8px; background:transparent; border:1px solid #c9a96a; color:#c9a96a;">
        <i class="bi bi-plus-lg me-1"></i> Add New Address
    </a>
</div>
{% endblock %}
