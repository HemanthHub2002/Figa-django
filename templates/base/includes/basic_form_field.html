<div class="mb-3">
    <label class="form-label fw-medium">
        {{ field.label }}
    </label>
    {{ field }}
    {% if field.errors %}
    <div class="text-danger small mt-1">
        <i class="bi bi-exclamation-circle me-1"></i>{{ field.errors | striptags }}
    </div>
    {% endif %}
</div>
