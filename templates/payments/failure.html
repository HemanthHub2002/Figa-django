{% extends "base/base.html" %}

{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5" style="min-height:70vh;">

    <div class="card text-center" style="max-width:480px; width:100%; border-radius:24px; border:1px solid rgba(248,113,113,0.2);">
        
        <div class="card-body" style="padding:48px 36px;">

            <div style="width:80px; height:80px; border-radius:50%; background:rgba(248,113,113,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                <i class="bi bi-x-lg" style="font-size:40px; color:#f87171;"></i>
            </div>

            <h2 style="font-weight:700; color:#f87171; margin-bottom:8px;">Payment Failed</h2>

            {% if error %}
            <p style="color:#a0a0a0; margin-bottom:24px;">{{ error }}</p>
            {% else %}
            <p style="color:#a0a0a0; margin-bottom:24px;">Something went wrong with your payment. Please try again.</p>
            {% endif %}

            <a href="{% url 'home_page' %}" 
               class="btn w-100" style="background:#c9a96a; color:#000; border-radius:50px; font-weight:600; padding:12px;">
               <i class="bi bi-house me-1"></i> Go Back to Home
            </a>

        </div>

    </div>

</div>
{% endblock %}
