{% if razorpay_order %}
<div class="mt-4">
    <h5 style="font-weight:600; color:#f0f0f0; margin-bottom:12px;">
        <i class="bi bi-shield-check me-2" style="color:#c9a96a;"></i>Proceed to Payment
    </h5>
    <form id="payment-form" method="post" action="{% url 'payment_success' %}">
        <script src="https://checkout.razorpay.com/v1/checkout.js"
                data-key="{{ key_id }}"
                data-amount="{{ razorpay_order.amount }}"
                data-currency="{{ razorpay_order.currency }}"
                data-order_id="{{ razorpay_order.id }}"
                data-buttontext="Pay Now"
                data-name="FIGHA"
                data-description="Complete your purchase"
                data-theme.color="#c9a96a">
        </script>
        <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
    </form>
</div>
{% else %}
<p style="color:#f87171; margin-top:16px;">
    <i class="bi bi-exclamation-triangle me-1"></i>
    Please select an address to proceed with payment.
</p>
{% endif %}
