{% extends "base/base.html" %}

{% block title %}Payment Successful{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5" style="min-height:70vh;">

    <div class="card text-center" style="max-width:480px; width:100%; border-radius:24px; border:1px solid rgba(52,211,153,0.2);">
        
        <div class="card-body" style="padding:48px 36px;">

            <div style="width:80px; height:80px; border-radius:50%; background:rgba(52,211,153,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                <i class="bi bi-check-lg" style="font-size:40px; color:var(--success);"></i>
            </div>

            <h2 style="font-weight:700; color:var(--success); margin-bottom:8px;">Payment Successful!</h2>

            <p style="font-weight:600; color:var(--text-secondary); margin-bottom:4px;">Order #{{ order.id }}</p>

            <p style="color:var(--text-primary); margin-bottom:28px;">Thank you for your purchase!</p>

            <a href="{% url 'order_history_2' %}" 
               class="btn w-100" style="background:var(--accent); color:#000; border-radius:50px; font-weight:600; padding:12px;">
               <i class="bi bi-bag-check me-1"></i> View Your Orders
            </a>

        </div>

    </div>

</div>
{% endblock %}
