
{% extends 'base/base.html' %}
{% block title %}Carousel Image{% endblock %}

{% block content %}
<section class="container py-5" style="max-width: 700px;">

    <div class="card" style="border-radius:18px;">
        <div class="card-body" style="padding:30px;">
            <div class="text-center mb-4">
                <i class="bi bi-image" style="font-size:48px; color:#c9a96a;"></i>
                <h3 class="mt-3" style="font-weight:700; color:#f0f0f0;">
                    {% if object %}Edit{% else %}Add{% endif %} Carousel Image
                </h3>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn" style="background:#c9a96a; color:#000; border-radius:50px; font-weight:600; padding:10px 28px;">
                        <i class="bi bi-check-lg me-1"></i> Save
                    </button>
                    <a href="{% url 'carousel_list' %}" class="btn" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#a0a0a0; border-radius:50px; font-weight:600; padding:10px 28px;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</section>
{% endblock %}
