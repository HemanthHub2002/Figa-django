
{% extends 'base/base.html' %}
{% block title %}Delete Carousel Image{% endblock %}

{% block content %}
<section class="container py-5" style="max-width: 600px;">

    <div class="card" style="border-radius:18px;">
        <div class="card-body" style="padding:30px;">

            <div class="text-center mb-4">
                <div style="width:64px; height:64px; border-radius:50%; background:rgba(248,113,113,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto;">
                    <i class="bi bi-exclamation-triangle" style="font-size:32px; color:#f87171;"></i>
                </div>
                <h4 style="color:#f87171; margin-top:16px;">Confirm Delete</h4>
            </div>

            <p style="color:#a0a0a0; text-align:center;">
                Are you sure you want to delete
                <strong style="color:#f0f0f0;">{{ object.title }}</strong>?
            </p>

            <img src="{{ object.img.url }}"
                 class="img-fluid rounded mb-3"
                 style="border-radius:12px; border:1px solid rgba(255,255,255,0.08);">

            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn" style="background:transparent; border:1px solid #f87171; color:#f87171; border-radius:50px; font-weight:600; padding:8px 24px;">
                    <i class="bi bi-trash me-1"></i> Yes, Delete
                </button>
                <a href="{% url 'carousel_list' %}"
                   class="btn" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#a0a0a0; border-radius:50px; font-weight:600; padding:8px 24px;">
                    Cancel
                </a>
            </form>

        </div>
    </div>

</section>
{% endblock %}
