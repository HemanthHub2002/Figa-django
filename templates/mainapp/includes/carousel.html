<div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000">
  
  <div class="carousel-indicators">
    {% for carousel_image in carousel_images %}
      <button type="button"
              data-bs-target="#carouselExampleCaptions"
              data-bs-slide-to="{{ forloop.counter0 }}"
              class="{% if forloop.first %}active{% endif %}"
              aria-label="Slide {{ forloop.counter }}">
      </button>
    {% endfor %}
  </div>

  <div class="carousel-inner">

    {% for carousel_image in carousel_images %}
    <div class="carousel-item {% if forloop.first %}active{% endif %}">
      
      <!-- IMAGE -->
      <img src="{{ carousel_image.img.url }}"
           class="d-block w-100"
           alt="Slide {{ forloop.counter }}">

      <!-- CAPTION -->
      <div class="carousel-caption d-none d-md-block">
        <h5 style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-weight:800; letter-spacing:2px; font-size:3rem; margin-bottom:20px;">
          {% if forloop.counter == 1 %}
            SHIRTS
          {% elif forloop.counter == 2 %}
            DENIM
          {% elif forloop.counter == 3 %}
            BLAZERS
          {% else %}
            COLLECTION
          {% endif %}
        </h5>
        
        <a href="{% url 'products' %}" class="btn" 
           style="background:#c9a96a; color:#000; font-weight:700; border-radius:50px; padding:12px 32px; text-transform:uppercase; letter-spacing:1px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            Shop Now
        </a>
      </div>

    </div>
    {% endfor %}

  </div>

  <button class="carousel-control-prev" type="button"
          data-bs-target="#carouselExampleCaptions"
          data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button"
          data-bs-target="#carouselExampleCaptions"
          data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
