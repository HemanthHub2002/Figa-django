<section class="container my-5" style="padding: 20px 0;">
    <div class="text-center mb-4">
        <h2 style="font-weight:800; color:var(--text-primary); letter-spacing: -0.5px;">Shop By Category</h2>
        <div style="width: 50px; height: 3px; background: var(--accent); margin: 15px auto; border-radius: 2px;"></div>
        <p style="color:var(--text-muted); font-size: 1.1rem;">Find exactly what you're looking for</p>
    </div>
    
    <div class="row g-4 justify-content-center">
        <!-- Shirts -->
        <div class="col-6 col-md-3">
            <a href="{% url 'search_products' %}?q=shirt" class="text-decoration-none">
                <div class="card h-100 border-0 shadow-sm category-card text-center py-4" style="border-radius: 12px; transition: transform 0.3s ease, box-shadow 0.3s ease; background-color: #f8f9fa;">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/2503/2503380.png" alt="Shirts" width="60" class="mb-3 opacity-75">
                        <h5 class="card-title fw-semibold text-dark mb-0" style="font-family: 'Inter', sans-serif;">Shirts</h5>
                    </div>
                </div>
            </a>
        </div>
        
        <!-- T-Shirts -->
        <div class="col-6 col-md-3">
             <a href="{% url 'search_products' %}?q=t-shirt" class="text-decoration-none">
                <div class="card h-100 border-0 shadow-sm category-card text-center py-4" style="border-radius: 12px; transition: transform 0.3s ease, box-shadow 0.3s ease; background-color: #f8f9fa;">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">

                    </div>
                </div>
            </a>
        </div>
        
        <!-- Jeans -->

             <a href="{% url 'search_products' %}?q=jean" class="text-decoration-none">

                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <img src="https://img.icons8.com/color/96/jeans.png" alt="Jeans" width="60" class="mb-3 opacity-75">
                        <h5 class="card-title fw-semibold text-dark mb-0" style="font-family: 'Inter', sans-serif;">Jeans</h5>

             <a href="{% url 'search_products' %}?q=shoe" class="text-decoration-none">

</section>

<style>
.category-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    background-color: #fff !important;
    border: 1px solid var(--accent) !important;
}
.category-card:hover img {
    opacity: 1 !important;
}
</style>
