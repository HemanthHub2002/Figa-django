{% extends 'base/base.html' %}

{% block title %}
Verify OTP
{% endblock %}

{% block content %}

<section class="p-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-check" style="font-size:48px; color:#c9a96a;"></i>
                        <h3 class="mt-3">Verify OTP</h3>
                        <p class="text-muted mb-0" style="font-size:14px;">Enter the 6-digit code sent to your email</p>
                    </div>

                    {% if error %}
                    <div class="alert" style="background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#f87171; border-radius:12px;">
                        <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="otp" class="form-label">OTP Code</label>
                            <input type="text" class="form-control text-center"
                                   name="otp" id="otp" maxlength="6"
                                   placeholder="● ● ● ● ● ●"
                                   required
                                   style="font-size:20px; letter-spacing:8px; font-weight:600;">
                        </div>
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-check-circle me-2"></i>Verify
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'send_otp' %}" style="color:#c9a96a; font-size:13px; text-decoration:none;">
                            <i class="bi bi-arrow-repeat me-1"></i> Resend OTP
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</section>
{% endblock %}
