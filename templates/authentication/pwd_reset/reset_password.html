{% extends 'base/base.html' %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<section class="p-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="bi bi-key" style="font-size:48px; color:#c9a96a;"></i>
                        <h3 class="mt-3">Set New Password</h3>
                        <p class="text-muted mb-0" style="font-size:14px;">Choose a strong password for your account</p>
                    </div>

                    {% if error %}
                    <div class="alert" style="background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#f87171; border-radius:12px;">
                        <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="password1" class="form-label">New Password</label>
                            <input type="password" class="form-control"
                                   name="password1" id="password1"
                                   placeholder="Enter new password"
                                   required minlength="8">
                        </div>
                        <div class="mb-3">
                            <label for="password2" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control"
                                   name="password2" id="password2"
                                   placeholder="Confirm new password"
                                   required minlength="8">
                        </div>
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-check-lg me-2"></i>Reset Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</section>
{% endblock %}
