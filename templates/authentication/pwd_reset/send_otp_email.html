{% extends 'base/base.html' %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<section class="p-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock" style="font-size:48px; color:#c9a96a;"></i>
                        <h3 class="mt-3">Forgot Password</h3>
                        <p class="text-muted mb-0" style="font-size:14px;">Enter your email to receive an OTP</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email Address
                            </label>
                            <input type="email" class="form-control" name="email" id="email" required
                                   placeholder="Enter your registered email">
                        </div>
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-send me-2"></i>Send OTP
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</section>
{% endblock %}
