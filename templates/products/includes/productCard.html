<div class="card product-card" data-product-id="{{product.id}}">

    {% if product.thumbnail %}
        <div style="overflow:hidden; border-radius: 18px 18px 0 0; position: relative;">
            {% if product.is_new %}
            <span class="badge bg-danger position-absolute top-0 start-0 m-3 shadow-sm" style="z-index: 5; font-size: 0.8rem; padding: 6px 12px; border-radius: 50px;">
                New
            </span>
            {% endif %}
            <img src="{{ product.thumbnail.url }}"
                 class="card-img-top product-thumb"
                 alt="{{ product.title }}">
        </div>
    {% else %}
        <div class="product-thumb placeholder-img">
            <i class="bi bi-image" style="font-size:24px;"></i>
        </div>
    {% endif %}

    <div class="card-body d-flex flex-column">

        <a href="{% url 'product_details' product.pk %}" style="text-decoration:none;">
        <h6 class="card-title product-title">
            {{ product.title }}
        </h6>
        </a>

        <p class="card-text product-desc">
            {{ product.desc|truncatechars:70 }}
        </p>

        <div class="mt-auto">
            <div class="product-price mb-2">
                ₹ {{ product.price }}
            </div>

            {% if product.stock > 0 %}
                <button class="btn btn-sm btn-primary w-100 add-to-cart">
                    <i class="bi bi-bag-plus me-1"></i> Add to Cart
                </button>
            {% else %}
                <button class="btn btn-sm btn-secondary w-100" disabled>
                    Out of Stock
                </button>
            {% endif %}
        </div>

    </div>
</div>
