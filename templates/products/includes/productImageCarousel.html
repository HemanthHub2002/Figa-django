<div id="productImageCarousel"
     class="carousel slide product-carousel position-relative"
     data-bs-ride="carousel">

    {% if user.is_staff %}
    <!-- Admin Overlay Actions -->
    <div class="position-absolute top-0 start-0 m-3" style="z-index: 10;">
        <a href="{% url 'edit_product' product.pk %}" class="btn btn-light rounded-circle shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
            <i class="bi bi-pencil-square"></i>
        </a>
    </div>
    <div class="position-absolute top-0 end-0 m-3" style="z-index: 10;">
        <a href="{% url 'delete_product' product.pk %}" class="btn btn-light text-danger rounded-circle shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
             <i class="bi bi-trash3"></i>
        </a>
    </div>
    {% endif %}

    {% if product.images.all %}
    <!-- SLIDES -->
    <div class="carousel-inner">

        {% for image in product.images.all %}
        <div class="carousel-item {% if forloop.first %}active{% endif %}">



            <img src="{{ image.img.url }}"
                 class="d-block w-100 product-main-img"
                 alt="{{ product.title }}">
        </div>
        {% endfor %}

    </div>

    <!-- CONTROLS (only if more than 1 image) -->
    {% if product.images.count > 1 %}
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#productImageCarousel"
            data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#productImageCarousel"
            data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
    {% endif %}

    {% else %}
    <!-- EMPTY STATE -->
    <div class="d-flex align-items-center justify-content-center"
         style="height: 420px; background: var(--bg-secondary); color: var(--text-muted); border-radius: 18px; border: 1px dashed var(--border-color);">
        <div class="text-center">
            <i class="bi bi-images" style="font-size:48px; display:block; margin-bottom:12px;"></i>
            <p class="mb-2">No product images uploaded</p>
            <small style="color: #c9a96a;">
                Upload images to showcase this product
            </small>
        </div>
    </div>
    {% endif %}

</div>
