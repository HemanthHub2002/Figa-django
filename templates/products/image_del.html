{% extends 'base/base.html' %}

{% block title %}
Delete Product Image
{% endblock %}

{% block content %}

<section id="product-detail-section" class="container py-5">
    <div class="row g-4 align-items-start">

        <!-- LEFT: Product Image Carousel -->
        <div class="col-lg-6">
            {% include 'products/includes/productImageCarousel.html' %}
        </div>

        <!-- RIGHT: Delete Confirmation -->
        <div class="col-lg-6">
            <div class="product-info">

                <div class="mb-4">
                    <div style="width:56px; height:56px; border-radius:50%; background:rgba(248,113,113,0.1); display:flex; align-items:center; justify-content:center;">
                        <i class="bi bi-exclamation-triangle" style="font-size:28px; color:#f87171;"></i>
                    </div>
                    <h3 style="color:#f87171; margin-top:12px; font-weight:700;">
                        Delete Image?
                    </h3>
                </div>

                <p style="color:#a0a0a0;" class="mb-3">
                    Are you sure you want to delete this image from
                    <strong style="color:#f0f0f0;">{{ image.product.title }}</strong>?
                </p>

                <!-- Image preview -->
                <img src="{{ image.img.url }}"
                     class="img-fluid rounded mb-4"
                     style="max-height: 240px; object-fit: contain; border-radius:12px; border:1px solid rgba(255,255,255,0.08);"
                     alt="Image to delete">

                <form method="post">
                    {% csrf_token %}

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn" style="background:transparent; border:1px solid #f87171; color:#f87171; border-radius:50px; font-weight:600; padding:8px 24px;">
                            <i class="bi bi-trash me-1"></i> Yes, Delete
                        </button>

                        <a href="{% url 'product_details' image.Product.pk %}"
                           class="btn" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#a0a0a0; border-radius:50px; font-weight:600; padding:8px 24px;">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</section>

{% endblock %}
