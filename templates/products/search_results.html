{% extends 'base/base.html' %}

{% block title %}

{% endblock %}

{% block content %}
<section class="container py-4">

            <i class="bi bi-search me-2" style="color:var(--accent);"></i>

    </div>
    {% include 'products/includes/productsSection.html' %}
</section>
{% endblock %}
