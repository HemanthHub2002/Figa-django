{% extends 'base/base.html' %}

{% block title %}
Edit Product Image
{% endblock %}

{% block content %}

<section id="product-detail-section" class="container py-5">
    <div class="row g-4 align-items-start">

        <!-- LEFT: Product Image Carousel -->
        <div class="col-lg-6">
            {% include 'products/includes/productImageCarousel.html' %}
        </div>

        <!-- RIGHT: Edit Image Form -->
        <div class="col-lg-6">
            <div class="product-info">

                <h3 class="mb-3" style="color:#c9a96a; font-weight:700;">
                    <i class="bi bi-pencil-square me-2"></i>Edit Product Image
                </h3>

                <!-- Current image preview -->
                <img src="{{ image.img.url }}"
                     class="img-fluid rounded mb-3"
                     style="max-height: 240px; object-fit: contain; border-radius:12px; border:1px solid rgba(255,255,255,0.08);"
                     alt="Current Image">

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn" style="background:#c9a96a; color:#000; border-radius:50px; font-weight:600; padding:8px 24px;">
                            <i class="bi bi-check-lg me-1"></i> Save Changes
                        </button>

                        <a href="{% url 'product_details' image.Product.pk %}"
                           class="btn" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#a0a0a0; border-radius:50px; font-weight:600; padding:8px 24px;">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</section>

{% endblock %}
