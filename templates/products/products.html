{% extends 'base/base.html' %}

{% block title %}
Products
{% endblock %}

{% block content %}
<section class="container pt-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 style="font-weight:700; color:var(--text-primary);">All Products</h2>
        {% if user.is_staff %}
        <a href="{% url 'add_product' %}" class="btn" style="background:var(--accent); color:#000; border-radius:50px; font-weight:600; padding:8px 24px;">
            <i class="bi bi-plus-lg me-1"></i> Add Product
        </a>
        {% endif %}
    </div>
</section>
{% include 'products/includes/productsSection.html' %}
{% endblock %}
