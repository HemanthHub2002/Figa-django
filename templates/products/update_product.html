{% extends 'base/base.html' %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<section id="product-detail-section" class="container py-5">
    <div class="row g-4 align-items-start">

        <!-- LEFT: Product Image Carousel -->
        <div class="col-lg-6">
            {% include 'products/includes/productImageCarousel.html' %}
        </div>

        <!-- RIGHT: Edit Product -->
        <div class="col-lg-6">
            <div class="product-info">

                <!-- Thumbnail -->
                {% if product.thumbnail %}
                    <img src="{{ product.thumbnail.url }}"
                         class="product-thumbnail mb-3"
                         alt="{{ product.title }}">
                {% endif %}

                <!-- Title -->
                <h2 class="product-title mb-3">
                    <i class="bi bi-pencil-square me-2" style="color:#c9a96a; font-size:0.8em;"></i>
                    Edit {{ product.title }}
                </h2>

                <!-- Edit form -->
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-flex gap-2 mt-3 product-action-buttons">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i> Save Changes
                        </button>

                        <a href="{% url 'product_details' product.pk %}"
                           class="btn" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#a0a0a0;">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</section>

{% endblock %}
